<div class="mt-8">
  <h3 class="text-xl font-bold text-gray-900 mb-6 pl-3 border-l-4 border-black">5-Day Forecast</h3>
  
  <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-4 pt-2 pb-4">
    
    <div *ngFor="let day of dailyForecasts; let i = index" 
         class="bg-white rounded-2xl p-5 flex flex-col items-center border border-gray-100 hover:border-gray-300 transition-all cursor-pointer shadow-sm hover:shadow-md group relative w-full"
         [style.animation-delay]="(i * 0.1) + 's'"
         class="animate-fade-in-up">
         
      <div class="absolute inset-0 bg-gray-50 rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity"></div>
      
      <!-- Date -->
      <span class="text-gray-900 font-semibold mb-1 z-10">{{ day.dt * 1000 | date:'EE, MMM d' }}</span>
      
      <!-- Icon -->
      <div class="w-16 h-16 flex items-center justify-center my-2 z-10 group-hover:scale-110 transition-transform duration-300">
        <img [src]="'https://openweathermap.org/img/wn/' + day.weather[0].icon + '@2x.png'" 
             [alt]="day.weather[0].description" 
             class="w-full h-full filter drop-shadow-sm">
      </div>
      
      <!-- Temperatures -->
      <div class="flex items-center gap-3 mt-2 z-10">
        <span class="font-bold text-gray-900 text-lg">{{ day.main.temp_max | kelvinToCelsius }}°</span>
        <span class="text-sm text-gray-500">{{ day.main.temp_min | kelvinToCelsius }}°</span>
      </div>
      
      <span class="text-xs text-gray-500 mt-2 text-center capitalize z-10 truncate w-full">{{ day.weather[0].description }}</span>
    </div>

  </div>
</div>
